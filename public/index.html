<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <title>Chat Gemini</title>
    <style>
        body {
            font-family: sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 16px;
        }

        #chat {
            border: 1px solid #ccc;
            padding: 10px;
            height: 400px;
            overflow-y: scroll;
            margin-bottom: 10px;
            background-color: #f9f9f9;
        }

        .msg {
            padding: 6px 10px;
            margin: 6px 0;
            border-radius: 8px;
            max-width: 80%;
            word-wrap: break-word;
        }

        .user {
            background-color: #e0f7fa;
            align-self: flex-end;
            text-align: right;
            margin-left: auto;
        }

        .bot {
            background-color: #e8f5e9;
            align-self: flex-start;
            margin-right: auto;
        }

        #input {
            width: 100%;
            padding: 10px;
            font-size: 1rem;
        }
    </style>
</head>

<body>
    <h2>💬 Chat com Gemini</h2>
    <div id="chat"></div>
    <input type="text" id="input" placeholder="Digite sua mensagem e pressione Enter..." />
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
